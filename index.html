<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1020">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Vocal Assistant</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Golos+Text:wght@400;500;600&display=swap');

:root{
  --night:#0d1020; --panel:#171b2e; --panel2:#12162a; --line:#282e4a;
  --txt:#f0ede3; --muted:#8d92ab;
  --ember:#ff9d52; --flame:#ffd166; --air:#79cfff;
  --key-on1:#ffd166; --key-on2:#ff9d52;
  --good:#8ef0b0; --bad:#ff8f8f;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1200px 500px at 50% -10%, #1a1f3a 0%, transparent 60%),
    var(--night);
  color:var(--txt);
  font-family:"Golos Text","Segoe UI",system-ui,sans-serif;
  font-size:14px;
}
.wrap{max-width:1120px;margin:0 auto;display:flex;flex-direction:column;gap:10px;min-height:100dvh;
  padding:max(14px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right))
          max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left))}

/* ---------- header ---------- */
header{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
.brand{font-family:"Unbounded","Golos Text",sans-serif;font-weight:700;font-size:22px;letter-spacing:.5px;
  background:linear-gradient(90deg,var(--flame),var(--ember));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand .fire{-webkit-text-fill-color:initial;color:initial;margin-right:6px}
.subtitle{color:var(--muted);font-size:13px}
.hdr-right{margin-left:auto;display:flex;gap:16px;align-items:baseline;color:var(--muted);font-size:13px;font-variant-numeric:tabular-nums}
.hdr-right b{color:var(--txt);font-weight:600}

/* ---------- controls ---------- */
.bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
button{
  background:var(--panel);color:var(--txt);border:1px solid var(--line);
  padding:9px 14px;border-radius:999px;font-size:14px;font-family:inherit;cursor:pointer;
  transition:border-color .15s, color .15s, background .15s;
  touch-action:manipulation;
}
button:hover{border-color:var(--ember);color:var(--ember)}
button:focus-visible{outline:2px solid var(--air);outline-offset:2px}
button.primary{
  background:linear-gradient(135deg,var(--flame),var(--ember));
  color:#2a1503;border:none;font-weight:600;padding:10px 22px;font-size:15px;
  box-shadow:0 2px 14px #ff9d5238;
}
button.primary:hover{filter:brightness(1.07);color:#2a1503}
button.tgl.on{background:#33241457;border-color:var(--ember);color:var(--ember)}
.grp{display:flex;gap:6px;align-items:center;background:var(--panel2);border:1px solid var(--line);
  border-radius:999px;padding:3px}
.grp button{border:none;background:transparent;padding:7px 12px}
.grp .num{min-width:56px;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
.grp .num b{color:var(--flame)}
.spacer{flex:1}

.settings{display:flex;gap:14px 20px;align-items:center;flex-wrap:wrap;color:var(--muted);font-size:13px}
.slider{display:flex;align-items:center;gap:8px;white-space:nowrap}
.slider .val{min-width:26px;text-align:right;color:var(--txt);font-variant-numeric:tabular-nums}
input[type=range]{accent-color:var(--ember);width:110px;cursor:pointer}
input[type=range]:focus-visible{outline:2px solid var(--air);outline-offset:2px}

/* ---------- библиотека песен ---------- */
.shelf{display:flex;gap:10px;align-items:center;font-size:13px;color:var(--muted)}
.shelf b{color:var(--flame)}
.modal{position:fixed;inset:0;background:#05070ecc;backdrop-filter:blur(5px);display:none;
  z-index:40;align-items:center;justify-content:center;padding:18px}
.modal.open{display:flex}
.sheet{background:var(--panel2);border:1px solid var(--line);border-radius:16px;
  max-width:620px;width:100%;max-height:min(82dvh,680px);display:flex;flex-direction:column;
  box-shadow:0 24px 70px #000d}
.sh-head{display:flex;gap:10px;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line)}
.sh-head .ttl{font-family:"Unbounded",sans-serif;font-weight:500;font-size:15px}
.sh-head input{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:9px;
  color:var(--txt);padding:8px 12px;font-size:14px;font-family:inherit;min-width:60px}
.sh-head input:focus-visible{outline:2px solid var(--air);outline-offset:1px}
.sh-close{background:transparent;border:none;padding:6px 10px;font-size:16px}
.slist{overflow-y:auto;padding:8px;flex:1}
.scard{display:flex;gap:12px;align-items:center;padding:11px 13px;border-radius:12px;cursor:pointer;
  border:1px solid transparent;transition:background .12s,border-color .12s;user-select:none}
.scard:hover{background:#ffffff07;border-color:var(--line)}
.scard:focus-visible{outline:2px solid var(--air);outline-offset:1px}
.scard.active{border-color:var(--ember);background:#33241436}
.scard .s-main{flex:1;min-width:0}
.s-title{font-weight:600;font-size:15px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.scard.active .s-title{color:var(--ember)}
.s-sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.s-meta{color:var(--muted);font-size:12px;margin-top:3px;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:1px 8px;border-radius:999px;font-size:10.5px;font-weight:400;
  border:1px solid var(--line);color:var(--muted);white-space:nowrap}
.badge.midi{color:#9ecbff;border-color:#31517a}
.badge.xml{color:#b6f0c0;border-color:#2f6b45}
.badge.repo{color:var(--flame);border-color:#7a5a28}
.s-del{background:transparent;border:none;color:var(--muted);font-size:14px;padding:8px 10px;border-radius:8px}
.s-del:hover{color:var(--bad);background:#ff8f8f14}
.sh-foot{display:flex;gap:10px;align-items:center;padding:11px 16px;border-top:1px solid var(--line);
  color:var(--muted);font-size:12px;flex-wrap:wrap}
@media (max-width:640px){
  .modal{padding:0;align-items:flex-end}
  .sheet{max-width:none;border-radius:16px 16px 0 0;max-height:88dvh}
}

/* ---------- timeline ---------- */
.tl{position:relative;height:26px;cursor:pointer;user-select:none;touch-action:none}
.tl .rail{position:absolute;left:0;right:0;top:11px;height:4px;border-radius:4px;background:var(--line)}
.tl .fill{position:absolute;left:0;top:11px;height:4px;border-radius:4px;width:0;
  background:linear-gradient(90deg,#a85c22,var(--ember));box-shadow:0 0 8px #ff9d5266}
.tl .tick{position:absolute;top:8px;width:1px;height:10px;background:#3d4468}
.tl .dot{position:absolute;top:13px;width:12px;height:12px;border-radius:50%;transform:translate(-50%,-50%);
  background:var(--flame);box-shadow:0 0 10px var(--ember);pointer-events:none}

/* ---------- roll ---------- */
.roll{
  position:relative;flex:1 1 auto;min-height:240px;border:1px solid var(--line);border-radius:14px;overflow:hidden;
  background:linear-gradient(#0e1224 0%, #0a0d1c 78%, #131022 100%);
}
.cguide{position:absolute;top:0;bottom:0;width:1px;background:#ffffff0d;pointer-events:none}
.lane{position:absolute;top:0;bottom:0;background:#00000042;pointer-events:none}
.beat{position:absolute;left:0;right:0;height:1px;background:#ffffff0b;pointer-events:none}
.beat.bar{background:#ffffff22}
.nowline{position:absolute;left:0;right:0;bottom:56px;height:2px;pointer-events:none;
  background:linear-gradient(90deg,transparent,var(--ember) 12%,var(--flame) 50%,var(--ember) 88%,transparent);
  box-shadow:0 0 14px var(--ember),0 0 40px #ff9d5240;opacity:.75}
.note{position:absolute;border-radius:7px;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;
  background:linear-gradient(180deg,#5d67ab,#39406f);
  box-shadow:inset 0 1px 0 #ffffff30,inset 0 0 0 1px #ffffff12,0 2px 8px #0007;
  transition:box-shadow .12s;
}
.note.blk{background:linear-gradient(180deg,#8f7c54,#5c4d31);
  box-shadow:inset 0 1px 0 #ffffff28,inset 0 0 0 1px #ffffff10,0 2px 8px #0007}
.note .nlab{font-size:10px;line-height:1;padding:3px 0;color:#dde2f5b5;pointer-events:none}
.note.blk .nlab{color:#ffe9bfb0}
.note.lit{background:linear-gradient(180deg,#ffe08a,var(--ember));
  box-shadow:0 0 20px #ff9d52dd,inset 0 1px 0 #ffffff80,inset 0 0 0 1px #fff3}
.note.lit .nlab{color:#3a2002;font-weight:600}
.note.past{opacity:.3}
.breath{position:absolute;left:0;right:0;height:0;border-top:2px dashed var(--air);opacity:.45;pointer-events:none}
/* контур рисуется поверх водопада; падающие ноты слегка приглушаем для читаемости */
.roll.hmode .note{opacity:.32}
.roll.hmode .note.lit{opacity:.85}
.roll.hmode .breath{opacity:.2}
/* водопад выключен совсем */
.roll.nowf .note,.roll.nowf .breath,.roll.nowf .lane,.roll.nowf .cguide,
.roll.nowf .beat,.roll.nowf .nowline{display:none!important}
/* контур без водопада — приглушение не нужно */
.roll.nowf .note{opacity:1}
.breath::after{content:"вдох";position:absolute;right:10px;top:-16px;font-size:11px;color:var(--air);letter-spacing:.4px}
html[lang="en"] .breath::after{content:"breath"}
.grp.step{padding:2px;gap:2px}
.grp.step button{padding:5px 12px;font-size:15px;line-height:1}
.grp.step .val{min-width:30px;text-align:center;color:var(--flame);font-weight:600}

.nowbox{position:absolute;top:10px;left:10px;z-index:5;display:flex;align-items:center;gap:12px;
  background:#12162acc;border:1px solid var(--line);border-radius:12px;padding:8px 14px;backdrop-filter:blur(6px)}
.nowbox .cur{font-family:"Unbounded",sans-serif;font-weight:700;font-size:26px;color:var(--flame);line-height:1}
.nowbox .cur small{display:block;font-family:"Golos Text",sans-serif;font-weight:400;font-size:11px;color:var(--muted);margin-top:3px}
.nowbox .nxt{font-size:13px;color:var(--muted);border-left:1px solid var(--line);padding-left:12px}
.nowbox .nxt b{color:var(--air);font-weight:600}

.countin{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;pointer-events:none;
  font-family:"Unbounded",sans-serif;font-weight:700;font-size:88px;color:var(--flame);
  text-shadow:0 0 40px var(--ember),0 0 90px #ff9d5266;
  animation:pulse 1s ease-in-out infinite}
@keyframes pulse{50%{transform:scale(1.07)}}
@media (prefers-reduced-motion:reduce){.countin{animation:none}}

/* ---------- keyboard ---------- */
.keys{position:relative;height:140px;user-select:none}
.keys::before{ /* «фетровая» полоса над клавишами — янтарная, в тон костра */
  content:'';position:absolute;top:-2px;left:0;right:0;height:5px;z-index:5;border-radius:3px;
  background:linear-gradient(90deg,#8a2f0e,#e0561f 18%,#ff7a36 50%,#e0561f 82%,#8a2f0e);
  box-shadow:0 1px 4px #000a;
}
.wkey{position:absolute;top:0;bottom:0;border-radius:0 0 6px 6px;
  background:linear-gradient(180deg,#fdfbf3 0%,#f3eddd 68%,#d9d0b8 100%);
  border:1px solid #99906f;border-top:none;
  box-shadow:inset 1px 0 0 #ffffffb0,inset -2px 0 3px #00000014,0 4px 0 #a89b7c,0 5px 4px #0008;
  transition:transform .05s, background .08s;
}
.wkey.on{transform:translateY(2px);
  background:linear-gradient(180deg,#ffe9a8,var(--key-on2) 90%);
  box-shadow:inset 1px 0 0 #ffffff70,0 0 22px #ff9d52cc,0 2px 0 #b25f1e;border-color:#c77b32}
.bkey{position:absolute;top:0;height:60%;z-index:3;border-radius:0 0 5px 5px;
  background:linear-gradient(180deg,#454b5e 0%,#191c28 22%,#0a0c13 78%,#181a24 100%);
  border:1px solid #04060a;border-top:none;
  box-shadow:inset 0 2px 2px #ffffff1f,inset 2px 0 2px #ffffff0d,0 4px 0 #000,0 5px 4px #000b;
  transition:transform .05s, background .08s;
}
.bkey.on{transform:translateY(2px);
  background:linear-gradient(180deg,#ffcf6b,#c96f22);
  box-shadow:0 0 22px #ff9d52cc,0 2px 0 #6e3a0f}
.klabel{position:absolute;bottom:6px;width:100%;text-align:center;font-size:10px;color:#8b8368;pointer-events:none}
.wkey.on .klabel{color:#4a2708;font-weight:700}
@media (prefers-reduced-motion:reduce){.wkey,.bkey{transition:none}}

#pc{position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none}
#fx{position:absolute;inset:0;width:100%;height:100%;z-index:3;pointer-events:none}
#hv{position:absolute;inset:0;width:100%;height:100%;z-index:4;pointer-events:none}
.sung b{color:var(--good)}
.sung.off b{color:var(--bad)}
.sung #sungCents{color:var(--muted);font-size:11px}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(10px);
  background:var(--panel);border:1px solid var(--line);color:var(--txt);padding:10px 18px;
  border-radius:10px;opacity:0;pointer-events:none;transition:.25s;z-index:50;max-width:90vw}
.toast.show{opacity:1;transform:translateX(-50%)}

#lyrics{position:absolute;left:8px;right:8px;bottom:64px;z-index:5;pointer-events:none;
  text-align:center;font-size:15px;line-height:1.6;color:#b6bcd4;
  background:#0d102047;border-radius:12px;padding:10px 14px;
  text-shadow:0 1px 2px #000e,0 0 6px #000b;
  max-height:7.6em;overflow:hidden}
#lyrics .lline{display:block}
#lyrics .lline span:not(.hold){background-image:linear-gradient(90deg,#ff9d523d,#ff9d523d);
  background-repeat:no-repeat;background-size:0 100%;border-radius:4px}
#lyrics .done{color:#ff9d52}
#lyrics .cur{color:#ffd166;font-weight:700;text-shadow:0 0 12px #ff9d52cc,0 1px 2px #000}
#lyrics .soon{color:#f0ede3}
#lyrBall{position:absolute;width:9px;height:9px;border-radius:50%;display:none;margin-left:-4.5px;
  background:radial-gradient(circle at 35% 30%,#ffe9a8,var(--ember));
  box-shadow:0 0 10px var(--ember),0 0 20px #ff9d5266}
/* хвост тянущегося слога: штрих = одна доля, просвет = граница долей */
#lyrics .hold{display:inline-block;height:4px;margin:0 3px 3px 3px;
  background:repeating-linear-gradient(90deg,#5d67ab4d 0 13px,transparent 13px 18px);
  position:relative;overflow:hidden;vertical-align:baseline}
#lyrics .hold i{position:absolute;left:0;top:0;bottom:0;width:0;
  background:repeating-linear-gradient(90deg,var(--flame) 0 13px,transparent 13px 18px)}
.badge.lyrb{color:#e0b7ff;border-color:#77518c}

footer{color:var(--muted);font-size:12px;line-height:1.6}
footer kbd{background:var(--panel);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-family:inherit;font-size:11px}

#moreBtn{display:none}
#morePanel{display:contents}
@media (max-width:760px){
  .brand{font-size:17px}
  .subtitle{display:none}
  .hdr-right{margin-left:auto}
  #rangeInfo{display:none}
  .wrap{gap:7px;padding-top:max(8px, env(safe-area-inset-top))}
  button{padding:8px 11px;font-size:13px}
  button.primary{padding:9px 16px;font-size:14px}
  #moreBtn{display:inline-block}
  #morePanel{display:none}
  .bar.expanded #morePanel{display:flex;flex-wrap:wrap;gap:8px;align-items:center;width:100%}
  footer{display:none}
  .keys{height:92px}
  .nowbox{padding:5px 9px;gap:8px}
  .nowbox .cur{font-size:18px}
  .nowbox .cur small{font-size:10px}
  #lyrics{font-size:13px;bottom:60px;max-height:6.2em;padding:6px 10px}
  .countin{font-size:64px}
  input[type=range]{width:90px}
  .shelf{font-size:12px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="fire">🔥</span>Vocal Assistant</div>
    <div class="subtitle" data-i18n="subtitle">вокальный тренажёр</div>
    <div class="hdr-right">
      <span id="hitBox" style="display:none">🎯 <b id="hitPct">—</b></span>
      <span id="rangeInfo"></span>
      <span><span data-i18n="phrase">фраза</span> <b id="phNum">1</b>/<span id="phTotal">?</span></span>
      <span><b id="clock">0:00</b> / <span id="dur">0:00</span></span>
    </div>
  </header>

  <div class="bar">
    <button id="play" class="primary">▶ Петь</button>
    <button id="restart" title="Сначала (R)">⟲</button>
    <div class="grp">
      <button id="phPrev" title="←">⟨</button>
      <div class="num"><span data-i18n="phrase">фраза</span> <b id="phNum2">1</b></div>
      <button id="phNext" title="→">⟩</button>
    </div>
    <button id="micBtn" class="tgl" data-i18n="mic">🎙 микрофон</button>
    <button id="moreBtn" title="Ещё">⚙</button>
    <input id="fileInp" type="file" accept=".mxl,.musicxml,.xml,.mid,.midi" style="display:none">
    <div id="morePanel">
    <button id="phLoop" class="tgl" data-i18n="repeat">🔁 повтор</button>
    <button id="legato" class="tgl on" data-i18n="legato">легато</button>
    <button id="wfBtn" class="tgl on" data-i18n="wf">⬇ водопад</button>
    <button id="hvBtn" class="tgl" data-i18n="hv">📈 контур</button>
    <button id="lyrBtn" class="tgl on" data-i18n="lyr" style="display:none">📝 текст</button>
    <button id="fileBtn" data-i18n="files">📂 ноты</button>
    <div class="spacer"></div>
    <div class="settings">
      <div class="slider"><span data-i18n="tempo">Темп</span> <input id="tempo" type="range" min="40" max="220" value="100"><span class="val" id="tempoVal">100</span></div>
      <div class="slider"><span data-i18n="key">Тон</span>
        <span class="grp step">
          <button id="trDown" title="−1">−</button>
          <span class="val" id="transpVal">0</span>
          <button id="trUp" title="+1">+</button>
        </span>
      </div>
      <div class="slider"><span data-i18n="voct">Октава</span>
        <span class="grp step">
          <button id="ocDown" title="−1">−</button>
          <span class="val" id="voctVal">0</span>
          <button id="ocUp" title="+1">+</button>
        </span>
      </div>
      <div class="slider">🎤 <input id="vol" type="range" min="0" max="100" value="60"></div>
      <div class="slider">🎹 <input id="accVol" type="range" min="0" max="100" value="45"></div>
      <button id="noteBtn" title="C-D-E / До-Ре-Ми">До-Ре-Ми</button>
      <button id="langBtn" title="Language">🌐 RU</button>
    </div>
    </div>
  </div>

  <div class="shelf">
    <button id="songsBtn">🎵 <span data-i18n="songsWord">Песни</span> <b id="songCount"></b> ⌄</button>
    <span id="curSongLine">—</span>
  </div>

  <div class="tl" id="tl">
    <div class="rail"></div>
    <div class="fill" id="tlFill"></div>
    <div class="dot" id="tlDot" style="left:0%"></div>
  </div>

  <div class="roll" id="roll">
    <div class="nowbox">
      <div class="cur"><span id="curNN">—</span><small id="curSub" data-i18n="curnote">текущая нота</small></div>
      <div class="nxt"><span data-i18n="next">дальше</span><br><b id="nextNN">—</b></div>
      <div class="nxt sung" id="sungBox" style="display:none"><span data-i18n="sing">пою</span><br><b id="sungNN">—</b> <span id="sungCents"></span></div>
    </div>
    <div class="nowline"></div>
    <canvas id="fx"></canvas>
    <canvas id="pc"></canvas>
    <canvas id="hv"></canvas>
    <div id="lyrics" style="display:none"></div>
    <div class="countin" id="countin" style="display:none">4</div>
  </div>

  <div class="keys" id="keys"></div>

  <footer id="footerText"></footer>
</div>

<div class="modal" id="songModal">
  <div class="sheet" role="dialog" aria-label="Библиотека песен">
    <div class="sh-head">
      <span class="ttl">🎵 <span data-i18n="songsWord">Песни</span></span>
      <input id="songSearch" type="search" placeholder="поиск по названию…" autocomplete="off">
      <button class="sh-close" id="songClose" title="Esc">✕</button>
    </div>
    <div class="slist" id="slist"></div>
    <div class="sh-foot">
      <button id="fileBtn2" data-i18n="openfile">📂 открыть файл…</button>
      <span data-i18n="footRepo">файлы из папки songs/ репозитория появляются здесь сами на всех устройствах</span>
    </div>
  </div>
</div>

function buildMelody(){
  const mel=VOCAL.map(n=>[n[0],n[1],n[2]+TRANSP+VOCT*12]);
  if(legatoOn){
    for(let i=0;i<mel.length-1;i++){
      const gap=mel[i+1][0]-(mel[i][0]+mel[i][1]);
      if(gap>0.001&&gap<0.6) mel[i][1]=mel[i+1][0]-mel[i][0]-0.03;
    }
  }
  return mel;
}

function rebuild(){
  keysEl.innerHTML=''; keyEl={};
  noteEls.forEach(e=>e.remove()); breathEls.forEach(e=>e.remove()); guideEls.forEach(e=>e.remove());
  noteEls=[]; breathEls=[]; guideEls=[];
  const mns=MELODY.map(n=>n[2]);
  // клавиатура всегда покрывает полные октавы диапазона песни: от До снизу до Си сверху
  let LOW=Math.floor(Math.min(...mns)/12)*12;
  let HIGH=Math.floor(Math.max(...mns)/12)*12+11;
  kLOW=LOW; kHIGH=HIGH;
  whites=[]; for(let m=LOW;m<=HIGH;m++) if(!isBlack(m)) whites.push(m);
  wW=100/whites.length;
  whites.forEach((m,i)=>{
    const k=document.createElement('div'); k.className='wkey';
    k.style.left=(i*wW)+'%'; k.style.width=wW+'%';
    const lab=document.createElement('div'); lab.className='klabel';
    lab.textContent=(m%12===0)?noteName(m)+octOf(m):noteName(m); // номер октавы — только на До
    if(m%12===0) lab.style.fontWeight='700';
    k.appendChild(lab); keysEl.appendChild(k); keyEl[m]=k;
  });
  for(let m=LOW;m<=HIGH;m++){
    if(!isBlack(m)) continue;
    const wi=whites.indexOf(m-1);
    const k=document.createElement('div'); k.className='bkey';
    k.style.left=((wi+1)*wW-wW*0.3)+'%'; k.style.width=(wW*0.6)+'%';
    keysEl.appendChild(k); keyEl[m]=k;
  }
  // тёмные дорожки под чёрные клавиши — на всю высоту рулона (как у midiano)
  for(let m=LOW;m<=HIGH;m++){
    if(!isBlack(m)) continue;
    const l=document.createElement('div'); l.className='lane';
    l.style.left=(xForMidi(m)-wW*0.3)+'%'; l.style.width=(wW*0.6)+'%';
    roll.appendChild(l); guideEls.push(l);
  }
  // octave guides at every C
  for(let m=LOW;m<=HIGH;m++){
    if(m%12!==0) continue;
    const i=whites.indexOf(m); if(i<0) continue;
    const g=document.createElement('div'); g.className='cguide';
    g.style.left=(i*wW)+'%'; roll.appendChild(g); guideEls.push(g);
  }
  noteEls=MELODY.map(n=>{
    const e=document.createElement('div');
    e.className='note'+(isBlack(n[2])?' blk':'');
    e.style.width=(isBlack(n[2])?wW*0.6:wW*0.72)+'%';
    e.style.left=(xForMidi(n[2])-(isBlack(n[2])?wW*0.3:wW*0.36))+'%';
    const lab=document.createElement('span'); lab.className='nlab'; lab.textContent=noteName(n[2]);
    e.appendChild(lab);
    roll.appendChild(e); return e;
  });
  breathEls=PHR.slice(1).map(()=>{
    const e=document.createElement('div'); e.className='breath'; roll.appendChild(e); return e;
  });
  const lo=Math.min(...mns), hi=Math.max(...mns);
  $('rangeInfo').textContent=t('range')+' '+noteFull(lo)+' — '+noteFull(hi);
}
function xForMidi(m){
  if(!isBlack(m)){const i=whites.indexOf(m);return (i+0.5)*wW;}
  const wi=whites.indexOf(m-1); return (wi+1)*wW;
}

function loadScript(src){

function freq(m){return 440*Math.pow(2,(m-69)/12);}
function playVox(m,dur){
  if(sfReady){ sfPlayer.queueWaveTable(ac,voxGain,sfFonts[4],ac.currentTime,m,dur,0.55); return; }
  const t=ac.currentTime, g=ac.createGain();
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1600; f.Q.value=0.7;
  g.connect(f); f.connect(voxGain);
  const lfo=ac.createOscillator(), lfoG=ac.createGain();
  lfo.frequency.value=5.2; lfoG.gain.value=freq(m)*0.006; lfo.connect(lfoG);
  [['sawtooth',0.5],['triangle',0.9]].forEach(([type,amp])=>{
    const o=ac.createOscillator(); o.type=type; o.frequency.value=freq(m);
    lfoG.connect(o.frequency);
    const og=ac.createGain(); og.gain.value=amp; o.connect(og); og.connect(g);
    o.start(t); o.stop(t+dur+0.25);
  });
  lfo.start(t); lfo.stop(t+dur+0.25);
  const peak=0.16;
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(peak,t+0.04);
  g.gain.setValueAtTime(peak,t+Math.max(0.04,dur-0.06));
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur+0.2);
}
function playAcc(m,dur,cat){
  if(sfReady){
    const font=sfFonts[cat||0]||sfFonts[0];
    sfPlayer.queueWaveTable(ac,accGain,font,ac.currentTime,m,dur,cat===1?0.5:0.35);
    return;
  }
  const t=ac.currentTime, g=ac.createGain();
  const f=ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2200; f.Q.value=0.5;
  g.connect(f); f.connect(accGain);
  [['triangle',1],['sine',0.6]].forEach(([type,amp])=>{
    const o=ac.createOscillator(); o.type=type; o.frequency.value=freq(m);
    const og=ac.createGain(); og.gain.value=amp; o.connect(og); og.connect(g);
    o.start(t); o.stop(t+dur+0.3);
  });
  const peak=m<52?0.14:0.09;
  const decay=Math.min(dur+0.25, m<52?1.6:1.1);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(peak,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+decay);
}
function click(hi){
  const t=ac.currentTime, o=ac.createOscillator(), g=ac.createGain();

  o.connect(g); g.connect(master);

  o.start(t); o.stop(t+0.1);
}

function phraseAt(q){let p=0;for(let i=0;i<PHR.length;i++)if(q>=PHR[i]-1e-6)p=i;return p;}
function phraseEnd(p){return p+1<PHR.length?PHR[p+1]:totalQ+1;}
function clearKeys(){active.clear();Object.values(keyEl).forEach(k=>k.classList.remove('on'));}
function updHud(q){
  const ph=phraseAt(q)+1;
  $('phNum').textContent=ph; $('phNum2').textContent=ph;
  $('clock').textContent=fmt(q/qPerSec());
  const pct=Math.min(100,Math.max(0,q/totalQ*100));
  $('tlFill').style.width=pct+'%'; $('tlDot').style.left=pct+'%';
}
function setPos(q){
  startQ=q; curIdx=idxFor(MELODY,q); accIdx=idxFor(ACC,q); clearKeys();
  pitchSamples.length=0;
  if(ac){startAcTime=ac.currentTime;}
  updHud(q); render(q); updNoteBox(q);
  if(hView) drawHView(q);
  if(typeof seekLyrics==='function'&&LYR) seekLyrics(q);
}
function reset(){cancelAnimationFrame(raf);playing=false;stopSound();countEl.style.display='none';
  $('play').textContent=t('play');setPos(0);
  $('curNN').textContent='—';$('curSub').textContent=t('curnote');$('nextNN').textContent='—';}

const LOOK=4;
// пул горизонтальных линий долей/тактов (создаются один раз, до нот — чтобы быть под ними)
const beatEls=[];
for(let i=0;i<LOOK+3;i++){
  const e=document.createElement('div'); e.className='beat'; e.style.display='none';
  roll.appendChild(e); beatEls.push(e);
}
function render(q){
  const rollH=roll.clientHeight-NOWLINE;
  let bi=0;
  for(let b=Math.ceil(q-1e-3); b<=q+LOOK && bi<beatEls.length; b++){
    if(b<0) continue;
    const e=beatEls[bi++];
    e.style.display='block';
    e.style.top=(rollH*(1-(b-q)/LOOK))+'px';
    e.classList.toggle('bar', b%4===0);
  }
  for(;bi<beatEls.length;bi++) beatEls[bi].style.display='none';
  for(let i=0;i<MELODY.length;i++){
    const [s,d,m]=MELODY[i], e=noteEls[i], top=s-q;
    if(top>LOOK||(s+d)<q-0.5){e.style.display='none';continue;}
    e.style.display='flex';
    const yB=rollH*(1-top/LOOK), h=Math.max(7,rollH*(d/LOOK));
    e.style.top=(yB-h)+'px'; e.style.height=h+'px';
    e.firstChild&&(e.children[0].style.display=h>=20?'block':'none');
    const sounding=s<=q&&q<s+d, past=s+d<=q;
    e.classList.toggle('lit',sounding);
    e.classList.toggle('past',past);
  }
  PHR.slice(1).forEach((ps,i)=>{
    const e=breathEls[i], top=ps-0.35-q;
    if(top>LOOK||top<-0.2){e.style.display='none';return;}
    e.style.display='block'; e.style.top=(rollH*(1-top/LOOK))+'px';
  });
}
function updNoteBox(q){
  let cur=null,next=null;
  for(let i=Math.max(0,curIdx-6);i<MELODY.length;i++){
    const [s,d,m]=MELODY[i];
    if(s<=q&&q<s+d){cur=MELODY[i];}
    if(s>q){next=MELODY[i];break;}
  }
  $('curNN').textContent=cur?noteName(cur[2]):'—';
  $('curSub').textContent=cur?noteFull(cur[2]):t('curnote');
  $('nextNN').textContent=next?noteFull(next[2]):'—';
  curNoteG=cur;
}
let startQ0Play=0, loopP=0;
function tick(){
  const q=nowQ();
  if(q<startQ0Play){
    countEl.style.display='flex'; countEl.textContent=Math.ceil(startQ0Play-q);
    raf=requestAnimationFrame(tick); return;
  }
  countEl.style.display='none';
  while(curIdx<MELODY.length&&MELODY[curIdx][0]<=q){
    const [s,d,m]=MELODY[curIdx];
    playVox(m,d/qPerSec());
    if(keyEl[m]){keyEl[m].classList.add('on');active.set(m,s+d);}
    spawnEmbers(m);
    curIdx++;
  }
  while(accIdx<ACC.length&&ACC[accIdx][0]<=q){
    const [s,d,m,cat]=ACC[accIdx];
    playAcc(m+TRANSP,d/qPerSec(),cat);
    accIdx++;
  }
  for(const [m,rel] of active){if(q>=rel){if(keyEl[m])keyEl[m].classList.remove('on');active.delete(m);}}
  render(q); drawFx(performance.now());
  if(hView) drawHView(q);
  updNoteBox(q); updHud(q); updateLyrics(q);
  if(loopPhrase&&q>=phraseEnd(loopP)-0.02){jumpTo(PHR[loopP]);raf=requestAnimationFrame(tick);return;}
  if(q>totalQ+1){reset();return;}
  raf=requestAnimationFrame(tick);
}
function play(withCount=true){
  unlockMedia(); initAudio(); if(ac.state==='suspended')ac.resume();
  playing=true; $('play').textContent=t('pause');
  hitN=0; hitT=0; $('hitPct').textContent='—';
  const q0=startQ;
  startQ0Play=q0;
  if(withCount){
    startQ=q0-4; startAcTime=ac.currentTime;
    for(let i=0;i<4;i++) setTimeout(()=>{if(playing)click(i===3);}, i/qPerSec()*1000);
  } else { startAcTime=ac.currentTime; }
  curIdx=idxFor(MELODY,q0); accIdx=idxFor(ACC,q0);
  raf=requestAnimationFrame(tick);
}
function pause(){startQ=Math.max(nowQ(),0);cancelAnimationFrame(raf);playing=false;stopSound();
  countEl.style.display='none';$('play').textContent=t('play');}
function jumpTo(q){
  clearKeys(); stopSound(); startQ=q; startQ0Play=q;
  curIdx=idxFor(MELODY,q); accIdx=idxFor(ACC,q);
  pitchSamples.length=0;
  if(ac)startAcTime=ac.currentTime;
  if(!playing) setPos(q); else {updHud(q); seekLyrics(q);}
}

/* ---- timeline ---- */
const tl=$('tl');
function buildTicks(){
  tl.querySelectorAll('.tick').forEach(t=>t.remove());
  PHR.forEach(p=>{
    if(p===0) return;
    const t=document.createElement('div'); t.className='tick';
    t.style.left=(p/totalQ*100)+'%'; tl.appendChild(t);
  });
}
buildTicks();
function tlSeek(e){
  const r=tl.getBoundingClientRect();
  const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left;
  const q=Math.min(totalQ,Math.max(0,x/r.width*totalQ));
  loopP=phraseAt(q); jumpTo(q);
}
tl.addEventListener('pointerdown',e=>{tlSeek(e);
  const mv=ev=>tlSeek(ev), up=()=>{window.removeEventListener('pointermove',mv);window.removeEventListener('pointerup',up);};
  window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
});

function updDur(){$('dur').textContent=fmt(totalQ/qPerSec());}
$('play').onclick=()=>{playing?pause():play(true);};

$('tempo').oninput=e=>{

  else updHud(startQ);
};
function setTransp(v){
  v=Math.max(-7,Math.min(7,Math.round(v)));
  if(v===TRANSP) return;
  TRANSP=v;
  $('transpVal').textContent=(TRANSP>0?'+':'')+TRANSP;
  LIB.prefs[curSongId]={...(LIB.prefs[curSongId]||{}), transp:TRANSP}; saveLibDebounced();
  const q=playing?nowQ():startQ;
  MELODY=buildMelody(); rebuild();
  if(playing){startQ=Math.max(q,0);startQ0Play=startQ;startAcTime=ac.currentTime;
    curIdx=idxFor(MELODY,startQ);accIdx=idxFor(ACC,startQ);}
  else setPos(startQ);
}
$('trDown').onclick=()=>setTransp(TRANSP-1);
$('trUp').onclick=()=>setTransp(TRANSP+1);
function setVoct(v){ // октава только вокального трека
  v=Math.max(-3,Math.min(3,Math.round(v)));
  if(v===VOCT) return;
  VOCT=v;
  $('voctVal').textContent=(VOCT>0?'+':'')+VOCT;
  LIB.prefs[curSongId]={...(LIB.prefs[curSongId]||{}), voct:VOCT}; saveLibDebounced();
  const q=playing?nowQ():startQ;
  MELODY=buildMelody(); rebuild();
  if(playing){startQ=Math.max(q,0);startQ0Play=startQ;startAcTime=ac.currentTime;
    curIdx=idxFor(MELODY,startQ);accIdx=idxFor(ACC,startQ);}
  else setPos(startQ);

$('ocDown').onclick=()=>setVoct(VOCT-1);
$('ocUp').onclick=()=>setVoct(VOCT+1);
$('vol').oninput=e=>{if(voxGain)voxGain.gain.value=e.target.value/100; UI.vol=+e.target.value; saveUI();};
$('accVol').oninput=e=>{if(accGain)accGain.gain.value=e.target.value/100; UI.accVol=+e.target.value; saveUI();};
function phraseStep(dir){
  const p=Math.min(PHR.length-1,Math.max(0,phraseAt(playing?nowQ():startQ)+dir));
  loopP=p; jumpTo(PHR[p]);
}
$('phPrev').onclick=()=>phraseStep(-1);
$('phNext').onclick=()=>phraseStep(1);
$('phLoop').onclick=e=>{
  loopPhrase=!loopPhrase;e.currentTarget.classList.toggle('on',loopPhrase);
  loopP=phraseAt(playing?nowQ():startQ);
};
$('legato').onclick=e=>{
  legatoOn=!legatoOn;e.currentTarget.classList.toggle('on',legatoOn);
  UI.legato=legatoOn; saveUI();
  const q=playing?nowQ():startQ; MELODY=buildMelody(); rebuild();
  if(playing){curIdx=idxFor(MELODY,q);} else setPos(startQ);
};

/* ---- караоке-текст: куплет с подсветкой текущего слога ---- */
let LYR=[], lyrOn=localStorage.getItem('vocalassist.lyrics')!=='0';
let sylPara=[], sylEnd=[], sylHold=[], lyrParas=[], lyrIdx=0, lyrParaShown=-1, lyrSpans=[], lyrPrevLine=null, lyrHoldMap={};
function buildLyrics(){
  lyrParas=[]; sylPara=[]; sylEnd=[]; lyrIdx=0; lyrParaShown=-1; lyrSpans=[]; lyrPrevLine=null;
  const box=$('lyrics');
  box.innerHTML='';
  const has=LYR.length>0;
  $('lyrBtn').style.display=has?'':'none';
  box.style.display=(has&&lyrOn)?'':'none';
  if(!has) return;
  let para=null, line=null;
  LYR.forEach((syl,i)=>{
    if(!para||syl[2]===2){para={lines:[]}; lyrParas.push(para); line=null;}
    if(!line||syl[2]>=1){line=[]; para.lines.push(line);}
    line.push(i);
    sylPara[i]=lyrParas.length-1;
  });
  // сколько тянется каждый слог: длина непрерывной цепочки нот мелодии от его начала
  sylHold=[];
  let vi=0;
  for(let i=0;i<LYR.length;i++){
    const q0=LYR[i][0], qNext=(i+1<LYR.length)?LYR[i+1][0]:Infinity;
    while(vi<MELODY.length&&MELODY[vi][0]+MELODY[vi][1]<=q0+0.001) vi++;
    let j=vi, end=q0;
    while(j<MELODY.length&&MELODY[j][0]<qNext-0.05&&MELODY[j][0]<=end+0.3){
      end=Math.max(end,MELODY[j][0]+MELODY[j][1]); j++;
    }
    sylHold[i]=Math.max(0,Math.min(end,qNext)-q0);
    sylEnd[i]=Math.min(qNext, q0+(sylHold[i]>0.4?sylHold[i]:2));
  }
}
let lyrSpanMap={}, lyrBallEl=null, lyrPrevFill=null;
function renderLyrPara(p){
  const box=$('lyrics');
  box.innerHTML=''; lyrSpans=[]; lyrSpanMap={}; lyrPrevFill=null; lyrHoldMap={};
  const para=lyrParas[p];
  if(!para) return;
  for(const line of para.lines){
    const ld=document.createElement('span'); ld.className='lline';
    for(const i of line){
      const sp=document.createElement('span'); sp.textContent=LYR[i][1]; sp._i=i;
      ld.appendChild(sp); lyrSpans.push(sp); lyrSpanMap[i]=sp;
      // хвост тянущегося слога: длина пропорциональна длительности
      if(sylHold[i]>=1.1){
        const h=document.createElement('span'); h.className='hold';
        h.style.width=Math.min(162,Math.round(sylHold[i]*18))+'px'; // 18px = одна доля, штрихи выровнены по долям
        const f=document.createElement('i'); h.appendChild(f);
        ld.appendChild(h); lyrHoldMap[i]=f;
      }
    }
    box.appendChild(ld);
  }
  if(!lyrBallEl){lyrBallEl=document.createElement('div'); lyrBallEl.id='lyrBall';}
  box.appendChild(lyrBallEl); // переживает перерисовку куплета
  box.scrollTop=0; lyrPrevLine=null;
}
function seekLyrics(q){
  lyrIdx=0;
  while(lyrIdx<LYR.length&&LYR[lyrIdx][0]<=q) lyrIdx++;
  lyrParaShown=-1;
  updateLyrics(q);
}
function updateLyrics(q){
  if(!LYR.length||!lyrOn) return;
  while(lyrIdx<LYR.length&&LYR[lyrIdx][0]<=q) lyrIdx++;
  const cur=lyrIdx-1;
  // какой куплет показывать: поём — текущий; в паузе — куплет следующего слога
  let show=cur>=0?sylPara[cur]:(LYR.length?0:-1);
  if((cur<0||q>sylEnd[cur]+1)&&lyrIdx<LYR.length) show=sylPara[lyrIdx];
  if(show!==lyrParaShown){lyrParaShown=show; renderLyrPara(show);}
  let curEl=null;
  for(const sp of lyrSpans){
    const i=sp._i;
    const isCur=(i===cur&&q<sylEnd[i]);
    sp.classList.toggle('cur',isCur);
    sp.classList.toggle('done',i<lyrIdx&&!isCur);
    sp.classList.toggle('soon',i===lyrIdx&&LYR[i][0]-q<=1.5);
    if(isCur) curEl=sp;
    const hf=lyrHoldMap[i];
    if(hf){ // заполнение хвоста: сколько уже протянуто
      let pct=0;
      if(i===cur) pct=Math.max(0,Math.min(1,(q-LYR[i][0])/Math.max(0.001,sylHold[i])));
      else if(i<lyrIdx) pct=1;
      hf.style.width=(pct*100).toFixed(1)+'%';
    }
  }
  // прокрутка к строке — ЗАРАНЕЕ, за ~1.5 доли до её первого слога, и плавно,
  // чтобы строка не прыгала в момент, когда пора вступать
  let targetLn=curEl?curEl.parentElement:null;
  const nxtSp=lyrIdx<LYR.length?lyrSpanMap[lyrIdx]:null;
  if(nxtSp&&LYR[lyrIdx][0]-q<=1.5) targetLn=nxtSp.parentElement;
  if(targetLn&&targetLn!==lyrPrevLine){
    lyrPrevLine=targetLn;
    const box=$('lyrics');
    box.scrollTo({top:Math.max(0,targetLn.offsetTop-box.clientHeight/2+targetLn.offsetHeight/2), behavior:'smooth'});
  }
  // заливка-прогресс на следующем слоге: заполняется за последние 2 доли
  const nxt=lyrIdx<LYR.length?lyrSpanMap[lyrIdx]:null;
  if(lyrPrevFill&&lyrPrevFill!==nxt) lyrPrevFill.style.backgroundSize='';
  if(nxt){
    const pct=Math.max(0,Math.min(1,(q-(LYR[lyrIdx][0]-2))/2));
    nxt.style.backgroundSize=(pct*100).toFixed(1)+'% 100%';
    lyrPrevFill=nxt;
  }
  // «прыгающий шарик»: летит от текущего слога к следующему, приземляется в момент вступления
  if(lyrBallEl){
    let show=false;
    if(nxt&&LYR[lyrIdx][0]-q<=4){
      const xb=nxt.offsetLeft+nxt.offsetWidth/2, yb=nxt.offsetTop;
      let xa=xb-46, ya=yb, qa=LYR[lyrIdx][0]-2;
      const a=lyrIdx-1;
      if(a>=0&&lyrSpanMap[a]){
        const sa=lyrSpanMap[a];
        xa=sa.offsetLeft+sa.offsetWidth/2; ya=sa.offsetTop; qa=LYR[a][0];
      }
      const tt=Math.max(0,Math.min(1,(q-qa)/Math.max(0.001,LYR[lyrIdx][0]-qa)));
      const x=xa+(xb-xa)*tt, y=ya+(yb-ya)*tt - 13 - 7*Math.sin(Math.PI*tt);
      lyrBallEl.style.left=x+'px';
      lyrBallEl.style.top=y+'px';
      show=true;
    }
    lyrBallEl.style.display=show?'block':'none';
  }
}
$('lyrBtn').onclick=()=>{
  lyrOn=!lyrOn;
  $('lyrBtn').classList.toggle('on',lyrOn);
  try{localStorage.setItem('vocalassist.lyrics',lyrOn?'1':'0');}catch(e){}

const LKEY='vocalassist.library';
let LIB={songs:[], prefs:{}, last:null};
try{
  const j=JSON.parse(localStorage.getItem(LKEY));
  if(j&&Array.isArray(j.songs)) LIB={songs:j.songs, prefs:j.prefs||{}, last:j.last||null};

const LAST0=LIB.last; // что было открыто в прошлый раз (до того, как applySong перезапишет)
let curSongId='builtin';
const BUILTIN={id:'builtin', title:'Костёр', artist:'Машина Времени', tempo:100, raw:RAW, acc:ACCRAW, phr:PHRASES};
function saveLib(){
  try{localStorage.setItem(LKEY,JSON.stringify(LIB));}
  catch(e){toast(t('storageFull'));}
}
let saveT=0;
function saveLibDebounced(){clearTimeout(saveT); saveT=setTimeout(saveLib,400);}
function allSongs(){
  const items=[];
  if(!repoSongs.some(s=>s.title===BUILTIN.title))
    items.push({kind:'builtin', id:'builtin', title:BUILTIN.title, artist:BUILTIN.artist,
      fmt:'', data:BUILTIN, open:()=>applySong(BUILTIN)});
  repoSongs.forEach(rs=>items.push({kind:'repo', id:rs.id, title:rs.title, artist:rs.artist,
    fmt:/\.midi?$/i.test(rs.name)?'MIDI':'MusicXML', size:rs.size, data:rs.data,
    open:()=>openRepoSong(rs).catch(err=>toast(t('cantOpen')+': '+err.message))}));
  LIB.songs.forEach(s=>items.push({kind:'local', id:s.id, title:s.title, artist:s.artist,
    fmt:s.fmt||'', data:s, open:()=>applySong(s),
    del:()=>{
      LIB.songs=LIB.songs.filter(x=>x.id!==s.id);
      delete LIB.prefs[s.id];
      toast(t('deleted')+': '+s.title);
      saveLib();
      if(curSongId===s.id) applySong(BUILTIN); else renderShelf();
    }}));
  return items;
}
function statsLine(d){
  if(!d||!d.raw||!d.raw.length) return null;
  const mns=d.raw.map(n=>n[2]);
  const lo=Math.min(...mns), hi=Math.max(...mns);
  let total=0;
  for(const n of d.raw) total=Math.max(total,n[0]+n[1]);
  for(const n of (d.acc||[])) total=Math.max(total,n[0]+n[1]);
  const bp=d.tempo||100;
  return fmt(total/(bp/60))+' · '+t('phrases')+': '+(d.phr?d.phr.length:'—')+' · '+
    noteFull(lo)+' — '+noteFull(hi)+' · ♩'+bp+
    ((d.acc&&d.acc.length)?'':' · '+t('noacc'));
}
const kindLabel=k=>t('kind_'+k);
function renderSongList(){
  const filter=($('songSearch').value||'').trim().toLowerCase();
  const list=$('slist'); list.innerHTML='';
  let shown=0;
  for(const it of allSongs()){
    if(filter&&!(it.title+' '+(it.artist||'')+' '+(it.fmt||'')+' '+kindLabel(it.kind)).toLowerCase().includes(filter)) continue;
    shown++;
    const c=document.createElement('div');
    c.className='scard'+(it.id===curSongId?' active':'');
    c.setAttribute('role','button'); c.tabIndex=0;
    const main=document.createElement('div'); main.className='s-main';
    const tt=document.createElement('div'); tt.className='s-title';
    tt.append(it.title);
    if(it.fmt){
      const b=document.createElement('span');
      b.className='badge '+(it.fmt==='MIDI'?'midi':'xml'); b.textContent=it.fmt;
      tt.appendChild(b);
    }
    if(it.data&&it.data.lyr&&it.data.lyr.length){
      const b=document.createElement('span'); b.className='badge lyrb'; b.textContent='📝';
      tt.appendChild(b);
    }
    if(it.kind==='repo'){
      const b=document.createElement('span'); b.className='badge repo'; b.textContent=t('repoBadge');
      tt.appendChild(b);
    }
    if(it.id===curSongId) tt.append(' ▶');
    const sub=document.createElement('div'); sub.className='s-sub';
    sub.textContent=(it.artist?it.artist+' · ':'')+kindLabel(it.kind);
    const meta=document.createElement('div'); meta.className='s-meta';
    meta.textContent=statsLine(it.data)||
      (t('notloaded')+(it.size?' · ≈'+Math.max(1,Math.round(it.size/1024))+' '+t('kb'):''));
    main.append(tt,sub,meta); c.appendChild(main);
    if(it.del){
      const d=document.createElement('button'); d.className='s-del'; d.textContent='✕';
      d.title=t('delTitle');
      d.onclick=e=>{e.stopPropagation(); it.del(); renderSongList();};
      c.appendChild(d);
    }
    c.onclick=()=>{closeSongModal(); if(it.id!==curSongId) it.open();};
    c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();c.onclick();}};
    list.appendChild(c);
  }
  if(!shown){
    const e=document.createElement('div'); e.className='s-sub'; e.style.padding='14px';
    e.textContent=filter?t('nothing'):t('empty');
    list.appendChild(e);
  }
}

/* ---- песни из репозитория (папка songs/) ---- */
const REPO_API='https://api.github.com/repos/keynode/VocalAssist/contents/songs';
const RKEY='vocalassist.repo';
const PARSE_V=4; // версия парсера: при улучшениях разборa кеш пере-парсится
let repoSongs=[];
function repoCache(){try{return JSON.parse(localStorage.getItem(RKEY))||{};}catch(e){return{};}}
async function loadRepoList(){
  const cache=repoCache();
  try{
    const r=await fetch(REPO_API,{headers:{'Accept':'application/vnd.github+json'}});
    if(!r.ok) throw 0;
    const files=(await r.json()).filter(f=>f.type==='file'&&/\.(mxl|musicxml|xml|midi?)$/i.test(f.name));
    repoSongs=files.map(f=>{
      const c=cache[f.name], fresh=c&&c.sha===f.sha&&c.v===PARSE_V;
      return {id:'repo:'+f.name, name:f.name, file:f.download_url, sha:f.sha, size:f.size,
        title:fresh?c.title:f.name.replace(/\.(mxl|musicxml|xml|midi?)$/i,''),
        artist:fresh?c.artist:'', data:fresh?c.data:null};
    });
    // подчистим кеш от удалённых из репозитория файлов
    const names=new Set(files.map(f=>f.name));
    let dirty=false;
    for(const n of Object.keys(cache)) if(!names.has(n)){delete cache[n];dirty=true;}
    if(dirty) try{localStorage.setItem(RKEY,JSON.stringify(cache));}catch(e){}
  }catch(e){
    // офлайн или лимит API — показываем то, что уже в кеше
    repoSongs=Object.entries(cache).map(([name,c])=>({
      id:'repo:'+name, name, file:c.file, sha:c.sha, title:c.title, artist:c.artist, data:c.data}));
  }
  renderShelf();
  // если в прошлый раз была открыта песня из репозитория — вернёмся к ней
  const last=repoSongs.find(s=>s.id===LAST0);
  if(last&&curSongId==='builtin'&&!playing) openRepoSong(last,true).catch(()=>{});
}
async function openRepoSong(rs,auto){
  if(!rs.data){
    if(!auto) toast(t('loading')+' «'+rs.title+'»…');
    const resp=await fetch(rs.file);
    if(!resp.ok) throw Error('нет сети или файл недоступен');
    const s=await parseSongData(rs.name, await resp.arrayBuffer());
    rs.title=s.title; rs.artist=s.artist;
    rs.data={raw:s.raw, acc:s.acc, phr:s.phr, tempo:s.tempo||100, lyr:s.lyr||[]};
    const cache=repoCache();
    cache[rs.name]={sha:rs.sha, v:PARSE_V, file:rs.file, title:rs.title, artist:rs.artist, data:rs.data};
    try{localStorage.setItem(RKEY,JSON.stringify(cache));}catch(e){}
  }
  // автозагрузка не должна перекрывать песню, которую пользователь уже выбрал сам
  if(auto&&(curSongId!=='builtin'||playing)) return;
  applySong({id:rs.id, title:rs.title, artist:rs.artist, tempo:rs.data.tempo,
    raw:rs.data.raw, acc:rs.data.acc, phr:rs.data.phr, lyr:rs.data.lyr});
}

/* ---- загрузка .mxl / .musicxml ---- */
const u16=(b,o)=>b[o]|b[o+1]<<8;
const u32=(b,o)=>(b[o]|b[o+1]<<8|b[o+2]<<16|b[o+3]<<24)>>>0;
async function unzipMxl(b){
  let e=-1;
  for(let i=b.length-22;i>=Math.max(0,b.length-65558);i--){
    if(b[i]===0x50&&b[i+1]===0x4b&&b[i+2]===0x05&&b[i+3]===0x06){e=i;break;}
  }
  if(e<0) throw Error('файл не похож на .mxl (zip)');
  const cnt=u16(b,e+10); let off=u32(b,e+16);
  const td=new TextDecoder(), entries=[];
  for(let i=0;i<cnt;i++){
    if(u32(b,off)!==0x02014b50) break;
    const method=u16(b,off+10), csize=u32(b,off+20),
          nlen=u16(b,off+28), elen=u16(b,off+30), clen=u16(b,off+32), lho=u32(b,off+42);
    entries.push({name:td.decode(b.subarray(off+46,off+46+nlen)),method,csize,lho});
    off+=46+nlen+elen+clen;
  }
  const entry=entries.find(x=>/\.(xml|musicxml)$/i.test(x.name)&&!/^META-INF/i.test(x.name));
  if(!entry) throw Error('внутри архива нет нот');
  const nlen=u16(b,entry.lho+26), elen=u16(b,entry.lho+28);
  const data=b.subarray(entry.lho+30+nlen+elen, entry.lho+30+nlen+elen+entry.csize);
  if(entry.method===0) return td.decode(data);
  if(entry.method!==8) throw Error('неподдерживаемое сжатие в zip');
  if(typeof DecompressionStream==='undefined') throw Error('браузер не умеет распаковывать .mxl — сохрани ноты как .musicxml');
  const ds=new DecompressionStream('deflate-raw');
  const out=await new Response(new Blob([data]).stream().pipeThrough(ds)).arrayBuffer();
  return new TextDecoder().decode(out);
}
const STEPS={C:0,D:2,E:4,F:5,G:7,A:9,B:11};
function parseMusicXML(text){
  const doc=new DOMParser().parseFromString(text,'application/xml');
  if(doc.querySelector('parsererror')) throw Error('не удалось прочитать XML');
  if(!doc.querySelector('score-partwise')) throw Error('поддерживается только формат score-partwise');
  let tempo=0;
  const parts=[...doc.querySelectorAll('score-partwise > part')].map(part=>{
    let div=1, pos=0, lastStart=0;
    const notes=[];
    for(const meas of part.children){
      if(meas.tagName!=='measure') continue;
      for(const el of meas.children){
        const tag=el.tagName;
        if(tag==='attributes'){
          const d=el.querySelector('divisions'); if(d) div=+d.textContent||div;
        } else if(tag==='sound'){
          if(el.getAttribute('tempo')&&!tempo) tempo=+el.getAttribute('tempo');
        } else if(tag==='direction'){
          const s=el.querySelector('sound[tempo]'); if(s&&!tempo) tempo=+s.getAttribute('tempo');
        } else if(tag==='backup'){
          pos-=+el.querySelector('duration').textContent/div;
        } else if(tag==='forward'){
          pos+=+el.querySelector('duration').textContent/div;
        } else if(tag==='note'){
          const durEl=el.querySelector(':scope > duration');
          const dur=durEl?+durEl.textContent/div:0;
          const chord=!!el.querySelector(':scope > chord');
          const grace=!!el.querySelector(':scope > grace');
          const start=chord?lastStart:pos;
          if(!chord) lastStart=pos;
          const pitch=el.querySelector(':scope > pitch');
          if(pitch&&!grace&&dur>0){
            const st=pitch.querySelector('step').textContent.trim();
            const alt=+(pitch.querySelector('alter')?.textContent||0);
            const oct=+pitch.querySelector('octave').textContent;
            notes.push({
              q:start, d:dur, m:STEPS[st]+alt+(oct+1)*12,
              staff:+(el.querySelector(':scope > staff')?.textContent||1),
              tieStop:!!el.querySelector(':scope > tie[type="stop"]')
            });
          }
          if(!chord&&!grace) pos+=dur;
        }
      }
    }
    notes.sort((a,b)=>a.q-b.q||a.m-b.m);
    for(let i=0;i<notes.length;i++){
      const n=notes[i]; if(!n.tieStop) continue;
      for(let j=i-1;j>=0;j--){
        const p=notes[j];
        if(!p.dead&&p.m===n.m&&Math.abs(p.q+p.d-n.q)<1e-3){p.d+=n.d;n.dead=true;break;}
      }
    }
    return {notes:notes.filter(n=>!n.dead)};
  });
  const pnames=[...doc.querySelectorAll('part-list score-part part-name')].map(x=>x.textContent.trim());
  parts.forEach((p,i)=>p.name=pnames[i]||'');
  const title=(doc.querySelector('work work-title')||doc.querySelector('movement-title'))?.textContent?.trim()||'Без названия';
  return {parts,title,tempo};
}
function splitSong(score){
  const parts=score.parts.filter(p=>p.notes.length);
  if(!parts.length) throw Error('в файле нет нот');
  let vocalNotes, accNotes;
  if(parts.length>1){
    let vi=parts.findIndex(p=>/voc|voice|голос|вокал|melod|sing|lead/i.test(p.name));
    if(vi<0) vi=0;
    vocalNotes=parts[vi].notes.slice();
    accNotes=parts.flatMap((p,i)=>i===vi?[]:p.notes);
  } else {
    const ns=parts[0].notes, minStaff=Math.min(...ns.map(n=>n.staff));
    const staves=new Set(ns.map(n=>n.staff));
    if(staves.size>1){
      vocalNotes=ns.filter(n=>n.staff===minStaff);
      accNotes=ns.filter(n=>n.staff!==minStaff);
    } else { vocalNotes=ns.slice(); accNotes=[]; }
  }
  // в вокале оставляем верхнюю ноту каждого созвучия, остальное — в аккомпанемент
  vocalNotes.sort((a,b)=>a.q-b.q||b.m-a.m);
  const vocal=[], extra=[];
  let lastQ=-Infinity;
  for(const n of vocalNotes){
    if(Math.abs(n.q-lastQ)<1e-3){extra.push(n);continue;}
    lastQ=n.q; vocal.push(n);
  }
  accNotes=accNotes.concat(extra).sort((a,b)=>a.q-b.q||a.m-b.m);
  const raw=vocal.map(n=>[n.q,n.d,n.m]);
  return {raw, acc:accNotes.map(n=>[n.q,n.d,n.m]), phr:findPhrases(raw,score.tempo)};
}
// вдох = пауза от ~полсекунды реального времени (порог в четвертях зависит от темпа)
function findPhrases(raw,tempo){
  const thr=Math.max(0.75, 0.5*(tempo||100)/60);
  const phr=[raw.length?raw[0][0]:0];
  for(let i=1;i<raw.length;i++){
    const gap=raw[i][0]-(raw[i-1][0]+raw[i-1][1]);
    if(gap>=thr) phr.push(raw[i][0]);
  }
  return phr;
}

/* ---- импорт MIDI (.mid) ---- */
const round3=x=>Math.round(x*1000)/1000;
function parseMidi(bytes){
  const dv=new DataView(bytes.buffer,bytes.byteOffset,bytes.byteLength);
  let p=0;
  const str=n=>{let s='';for(let i=0;i<n;i++)s+=String.fromCharCode(bytes[p+i]);p+=n;return s;};
  const u32b=()=>{const v=dv.getUint32(p);p+=4;return v;};
  const u16b=()=>{const v=dv.getUint16(p);p+=2;return v;};
  if(str(4)!=='MThd') throw Error('это не MIDI-файл');
  const hlen=u32b(); u16b(); const ntrk=u16b(), div=u16b();
  p+=hlen-6;
  if(div&0x8000) throw Error('SMPTE-время в MIDI не поддерживается');
  const groups=new Map(), tempos=[], trackNames=[], rawTexts=[];
  function grp(tr,ch){
    const k=tr+':'+ch;
    let g=groups.get(k);
    if(!g){g={tr,ch,notes:[],prog:null};groups.set(k,g);}
    return g;
  }
  for(let tr=0;tr<ntrk&&p<bytes.length;tr++){
    const id=str(4), len=u32b();
    if(id!=='MTrk'){p+=len;tr--;continue;}
    const end=p+len;
    let tick=0, run=0, tname='';
    const open={};
    while(p<end){
      let d=0,b;
      do{b=bytes[p++];d=(d<<7)|(b&0x7f);}while(b&0x80);
      tick+=d;
      let st=bytes[p];
      if(st&0x80){p++; if(st<0xF0) run=st;} else st=run;
      if(st===0xFF){
        run=0;
        const type=bytes[p++];
        let l=0;do{b=bytes[p++];l=(l<<7)|(b&0x7f);}while(b&0x80);
        if(type===0x51&&l===3) tempos.push({tick, us:(bytes[p]<<16)|(bytes[p+1]<<8)|bytes[p+2]});
        else if(type===0x03&&!tname){let s='';for(let i=0;i<l;i++)s+=String.fromCharCode(bytes[p+i]);tname=s.trim();}
        else if((type===0x01||type===0x05)&&l>0) rawTexts.push({tick, type, raw:bytes.slice(p,p+l)});
        p+=l;
      } else if(st===0xF0||st===0xF7){
        run=0;
        let l=0;do{b=bytes[p++];l=(l<<7)|(b&0x7f);}while(b&0x80);
        p+=l;
      } else {
        const ch=st&0x0f, hi=st&0xf0;
        if(hi===0x90||hi===0x80){
          const note=bytes[p++], vel=bytes[p++];
          const key=ch+':'+note;
          if(hi===0x90&&vel>0) open[key]=tick;
          else{
            const t0=open[key]; delete open[key];
            if(t0!=null&&tick>t0) grp(tr,ch).notes.push({q:t0/div, d:(tick-t0)/div, m:note});
          }
        }
        else if(hi===0xC0){grp(tr,ch).prog??=bytes[p]; p++;}
        else if(hi===0xD0) p+=1;
        else p+=2; /* 0xA0/0xB0/0xE0 */
      }
    }
    for(const key in open){
      const [ch,note]=key.split(':').map(Number);
      grp(tr,ch).notes.push({q:open[key]/div, d:0.5, m:note});
    }
    trackNames[tr]=tname;
    p=end;
  }
  let bpm=120;
  if(tempos.length){
    tempos.sort((a,b)=>a.tick-b.tick);
    let endTick=0;
    for(const g of groups.values()) for(const n of g.notes) endTick=Math.max(endTick,(n.q+n.d)*div);
    const durByUs=new Map();
    for(let i=0;i<tempos.length;i++){
      const from=tempos[i].tick, to=i+1<tempos.length?tempos[i+1].tick:Math.max(endTick,from+1);
      durByUs.set(tempos[i].us,(durByUs.get(tempos[i].us)||0)+(to-from));
    }
    let best=null;
    for(const [us,dur] of durByUs) if(!best||dur>best[1]) best=[us,dur];
    bpm=Math.round(60000000/best[0]);
  }
  // караоке-текст (.kar): text-события; кодировка — UTF-8, иначе windows-1251
  const lyr=[], karT=[];
  if(rawTexts.length){
    let enc='utf-8';
    try{
      const total=rawTexts.reduce((n,e)=>n+e.raw.length,0);
      const all=new Uint8Array(total); let o=0;
      for(const e of rawTexts){all.set(e.raw,o);o+=e.raw.length;}
      new TextDecoder('utf-8',{fatal:true}).decode(all);
    }catch(e){enc='windows-1251';}
    const td2=new TextDecoder(enc);
    let pendNl=0;
    rawTexts.sort((x,y)=>x.tick-y.tick);
    for(const ev of rawTexts){
      let x=td2.decode(ev.raw);
      if(ev.type===0x01&&x.startsWith('@')){
        if(x[1]==='T'){const v=x.slice(2).trim(); if(v&&v.indexOf(':')<0&&v.indexOf(String.fromCharCode(92))<0&&!/mid$/i.test(v)) karT.push(v);}
        continue;
      }
      let nl=pendNl; pendNl=0;
      const BS=String.fromCharCode(92), CR=String.fromCharCode(13), LF=String.fromCharCode(10);
      if(ev.type===0x01){
        if(x.startsWith(BS)){nl=2;x=x.slice(1);}
        else if(x.startsWith('/')){nl=1;x=x.slice(1);}
      } else {
        while(x.startsWith(CR)||x.startsWith(LF)){nl=Math.max(nl,1);x=x.slice(1);}
        while(x.endsWith(CR)||x.endsWith(LF)){x=x.slice(0,-1);pendNl=1;}
      }
      if(x==='') {pendNl=Math.max(pendNl,nl); continue;}
      lyr.push([round3(ev.tick/div), x, nl]);
    }
  }
  return {groups:[...groups.values()], trackNames, bpm, lyr, karT};
}
function catOfProg(prog,g){
  const p=prog==null?0:prog;
  if(p>=32&&p<=39) return 1;                    // бас
  if(p>=24&&p<=31) return 2;                    // гитара
  if((p>=40&&p<=55)||(p>=88&&p<=95)) return 3;  // струнные и пэды
  if(g&&g.notes.length){
    const ps=g.notes.map(n=>n.m).sort((a,b)=>a-b);
    if(ps[ps.length>>1]<48) return 1;
  }
  return 0;                                     // клавиши и всё остальное
}
function splitMidiSong(mid){
  const cands=mid.groups.filter(g=>g.ch!==9&&g.notes.length>0); // канал 10 (9) — ударные, пропускаем
  if(!cands.length) throw Error('в MIDI нет нот');
  // выбираем вокальный голос: узкий певческий диапазон, мало многоголосия, подходящая высота
  let best=null, bestScore=-1e9;
  for(const g of cands){
    const ps=g.notes.map(n=>n.m).sort((a,b)=>a-b);
    const med=ps[ps.length>>1], rng=ps[ps.length-1]-ps[0];
    const ns=[...g.notes].sort((a,b)=>a.q-b.q);
    let ov=0;
    for(let i=1;i<ns.length;i++) if(ns[i].q<ns[i-1].q+ns[i-1].d-1e-6) ov++;
    let s=0;
    if(g.notes.length<30) s-=100;
    s-=Math.abs(med-67);
    s-=Math.max(0,rng-19)*0.7;
    s-=(ov/ns.length)*5;
    if(/voc|melod|voice|голос|вокал|lead|sing|мелод/i.test(mid.trackNames[g.tr]||'')) s+=25;
    if(s>bestScore){bestScore=s;best=g;}
  }
  const vn=[...best.notes].sort((a,b)=>a.q-b.q||b.m-a.m);
  const vocal=[]; let lastQ=-1e9;
  for(const n of vn){
    if(Math.abs(n.q-lastQ)<1e-3) continue;
    lastQ=n.q; vocal.push({...n});
  }
  for(let i=0;i<vocal.length-1;i++)
    if(vocal[i].q+vocal[i].d>vocal[i+1].q) vocal[i].d=Math.max(0.1,round3(vocal[i+1].q-vocal[i].q));
  const raw=vocal.map(n=>[round3(n.q),round3(n.d),n.m]);
  const acc=[];
  for(const g of cands){
    if(g===best) continue;
    const cat=catOfProg(g.prog,g);
    for(const n of g.notes) acc.push([round3(n.q),round3(n.d),n.m,cat]);
  }
  acc.sort((a,b)=>a[0]-b[0]||a[2]-b[2]);
  return {raw, acc, phr:findPhrases(raw,mid.bpm)};
}

/* ---- разбор файла песни любого формата ---- */
async function parseSongData(name,ab){
  if(/\.midi?$/i.test(name)){
    const mid=parseMidi(new Uint8Array(ab));
    const s=splitMidiSong(mid);
    s.tempo=mid.bpm; s.lyr=mid.lyr;
    // название: из караоке-заголовка @T, иначе имя файла без технических суффиксов
    s.title=(mid.karT&&mid.karT[0])||
      name.replace(/\.[^.]+$/,'').replace(/\s*\((?:Караоке|Karaoke|XG|GM|GS)\)\s*$/i,'').trim();
    s.artist=(mid.karT&&mid.karT[1])||'';
    return s;
  }
  const text=/\.mxl$/i.test(name)?await unzipMxl(new Uint8Array(ab)):new TextDecoder('utf-8').decode(ab);
  const score=parseMusicXML(text), s=splitSong(score);
  let title=score.title, artist='';
  const mm=score.title.split(/\s+[-–—]\s+/);
  if(mm.length===2){artist=mm[0]; title=mm[1];}
  s.tempo=score.tempo; s.title=title; s.artist=artist;
  return s;
}
function applySong(s){
  if(playing) pause();
  curSongId=s.id||'builtin';
  VOCAL=s.raw; ACC=s.acc; PHR=s.phr;
  calcTotal();
  const pref=LIB.prefs[curSongId]||{};
  bpm=Math.round(Math.min(220,Math.max(40, pref.bpm||s.tempo||100)));
  $('tempo').value=bpm; $('tempoVal').textContent=bpm;
  TRANSP=pref.transp||0;
  $('transpVal').textContent=(TRANSP>0?'+':'')+TRANSP;
  VOCT=pref.voct||0;
  $('voctVal').textContent=(VOCT>0?'+':'')+VOCT;
  $('phTotal').textContent=PHR.length;
  lastSong={title:s.title, artist:s.artist||''};
  updCurSongLine();
  LYR=s.lyr||[];
  buildLyrics();
  MELODY=buildMelody();
  loopP=0; buildTicks(); rebuild(); reset(); updDur();
  LIB.last=curSongId; saveLibDebounced();
  renderShelf();
}
async function loadFile(file){
  const s=await parseSongData(file.name, await file.arrayBuffer());
  const title=s.title, artist=s.artist;
  const existing=LIB.songs.find(x=>x.title===title&&x.artist===artist);
  const entry={
    id: existing?existing.id:'s'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    title, artist, tempo:s.tempo||100,
    fmt:/\.midi?$/i.test(file.name)?'MIDI':'MusicXML',
    raw:s.raw, acc:s.acc, phr:s.phr, lyr:s.lyr||[]
  };
  if(existing) LIB.songs[LIB.songs.indexOf(existing)]=entry;
  else LIB.songs.push(entry);
  saveLib();
  applySong(entry);
  toast((existing?t('updated'):t('added'))+': '+title+' · '+t('phrases')+': '+entry.phr.length+(entry.acc.length?'':' · '+t('noacc')));
}

$('fileBtn2').onclick=()=>{closeSongModal(); $('fileInp').click();};
$('fileInp').onchange=e=>{
  const f=e.target.files[0];
  if(f) loadFile(f).catch(err=>toast(t('cantOpen')+': '+err.message));
  e.target.value='';
};
window.addEventListener('dragover',e=>e.preventDefault());
window.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0];
  if(f) loadFile(f).catch(err=>toast(t('cantOpen')+': '+err.message));

/* ---- микрофон и детекция высоты ---- */
const pc=$('pc');
let micOn=false, micStream=null, analyser=null, micBuf=null, micRaf=0;
let pitchSamples=[], curNoteG=null, hitN=0, hitT=0;
function sizeCanvas(){
  const d=window.devicePixelRatio||1;
  pc.width=Math.round(roll.clientWidth*d);
  pc.height=Math.round(roll.clientHeight*d);
  fx.width=pc.width; fx.height=pc.height;
  hv.width=pc.width; hv.height=pc.height;
}

/* ---- искры-угольки при зажигании ноты ---- */
const fx=$('fx'), hv=$('hv');
const reducedMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
let parts=[], lastFxT=0;
function spawnEmbers(midi){
  if(reducedMotion||!wfView||fx.width===0) return;
  const d=window.devicePixelRatio||1;
  const x=xPct(midi)*fx.width/100, y=fx.height-NOWLINE*d;
  for(let i=0;i<10;i++){
    parts.push({x, y, vx:(Math.random()-0.5)*46*d, vy:-(40+Math.random()*110)*d,
      life:0.45+Math.random()*0.55, t:0, r:(1+Math.random()*2)*d, warm:Math.random()});
  }
  if(parts.length>400) parts.splice(0,parts.length-400);
}
function drawFx(now){
  const ctx=fx.getContext('2d');
  ctx.clearRect(0,0,fx.width,fx.height);
  if(!parts.length){lastFxT=0;return;}
  const dt=lastFxT?Math.min(0.05,(now-lastFxT)/1000):0.016;
  lastFxT=now;
  parts=parts.filter(p=>(p.t+=dt)<p.life);
  for(const p of parts){
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=30*dt;
    const k=1-p.t/p.life;
    ctx.globalAlpha=k*0.9;
    ctx.fillStyle=p.warm>0.5?'#ffd166':'#ff9d52';
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*k+0.4,0,7); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function clearFx(){parts.length=0; if(fx.width) fx.getContext('2d').clearRect(0,0,fx.width,fx.height);}

/* ---- «контур»: ноты слева направо, голос — линией поверх (как в Erol Singer's Studio) ---- */
let hView=false;
const HV_PAGE=8; // четвертей на «страницу»: ноты стоят, бегунок и голос движутся слева направо
function rr(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}
function drawHView(q){
  const d=window.devicePixelRatio||1;
  if(hv.width!==Math.round(roll.clientWidth*d)||hv.height!==Math.round(roll.clientHeight*d)) sizeCanvas();
  const ctx=hv.getContext('2d'), W=hv.width, H=hv.height;
  ctx.clearRect(0,0,W,H);
  const lo=kLOW-1, hi=kHIGH+1, span=Math.max(1,hi-lo);
  const pad=10*d;
  const yOf=m=>pad+(hi-m)/span*(H-2*pad);
  const semiH=(H-2*pad)/span;
  const pageStart=Math.floor(q/HV_PAGE)*HV_PAGE;
  const xOf=t=>((t-pageStart)/HV_PAGE)*W;
  // вертикальные метки долей внутри страницы (каждая 4-я ярче)
  for(let b=0;b<=HV_PAGE;b++){
    ctx.fillStyle=((pageStart+b)%4===0)?'#ffffff14':'#ffffff08';
    ctx.fillRect(xOf(pageStart+b)-0.5*d,0,1*d,H);
  }
  // сетка высот: линия на каждой белой ноте, подпись слева
  ctx.font=(10*d)+'px "Golos Text",sans-serif'; ctx.textBaseline='bottom';
  for(let m=Math.ceil(lo);m<=hi;m++){
    if(isBlack(m)) continue;
    const y=yOf(m);
    ctx.fillStyle=(m%12===0)?'#ffffff1e':'#ffffff0b';
    ctx.fillRect(0,y,W,1*d);
    // номер октавы — только на До (границе октав), остальные линии — просто название
    ctx.fillStyle=(m%12===0)?'#a8adc4cc':'#8d92ab77';
    ctx.fillText((m%12===0)?noteName(m)+octOf(m):noteName(m),6*d,y-2*d);
  }
  // статичные отрезки нот текущей страницы
  for(let i=0;i<MELODY.length;i++){
    const [s,dur,m]=MELODY[i];
    if(s+dur<pageStart||s>pageStart+HV_PAGE) continue;
    const x1=Math.max(-4*d,xOf(s)), x2=Math.min(W+4*d,xOf(s+dur));
    const h=Math.max(4*d,semiH*0.72), y=yOf(m)-h/2;
    const sounding=s<=q&&q<s+dur, past=s+dur<=q;
    ctx.beginPath(); rr(ctx,x1,y,Math.max(3*d,x2-x1),h,h/2);
    if(sounding){
      ctx.fillStyle='#ffcf6b'; ctx.shadowColor='#ff9d52'; ctx.shadowBlur=16*d;
    } else if(past){ ctx.fillStyle='#4d568f66'; }
    else { ctx.fillStyle=isBlack(m)?'#a68b57':'#6b76c0'; }
    ctx.fill(); ctx.shadowBlur=0;
  }
  // бегущая линия времени
  const px=xOf(q);
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#ff9d5200'); g.addColorStop(0.5,'#ff9d52bb'); g.addColorStop(1,'#ff9d5200');
  ctx.fillStyle=g; ctx.fillRect(px-1*d,0,2*d,H);
  // след голоса: остаётся на странице позади бегунка
  if(micOn&&pitchSamples.length){
    const nowT=performance.now(), qps=qPerSec();
    ctx.lineWidth=2*d;
    let prev=null;
    for(const s of pitchSamples){
      const sq=(s.q!=null)?s.q:q-(nowT-s.t)/1000*qps;
      if(sq<pageStart||sq>q+0.05){prev=null;continue;}
      const x=xOf(sq), y=yOf(s.mf);
      const good=s.diff!=null&&Math.abs(s.diff)<=0.5;
      if(prev&&Math.abs(prev.y-y)<semiH*3&&x-prev.x<W*0.08){
        ctx.strokeStyle=good?'#8ef0b0cc':'#79cfffcc';
        ctx.beginPath(); ctx.moveTo(prev.x,prev.y); ctx.lineTo(x,y); ctx.stroke();
      }
      prev={x,y};
    }
    const last=pitchSamples[pitchSamples.length-1];
    if(last&&performance.now()-last.t<200){
      const lq=(last.q!=null)?Math.min(last.q,q):q, y=yOf(last.mf);
      const good=last.diff!=null&&Math.abs(last.diff)<=0.5;
      ctx.beginPath(); ctx.arc(xOf(lq),y,4*d,0,7);
      ctx.fillStyle=good?'#8ef0b0':'#79cfff';
      ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=12*d;
      ctx.fill(); ctx.shadowBlur=0;
    }
  }
}
function setHView(on){
  hView=on;
  $('hvBtn').classList.toggle('on',on);
  roll.classList.toggle('hmode',on);
  try{localStorage.setItem('vocalassist.hview',on?'1':'0');}catch(e){}
  if(on) drawHView(playing?nowQ():startQ);
  else if(hv.width) hv.getContext('2d').clearRect(0,0,hv.width,hv.height);
}
$('hvBtn').onclick=()=>setHView(!hView);
$('moreBtn').onclick=()=>document.querySelector('.bar').classList.toggle('expanded');

/* ---- водопад (падающие ноты) — тоже опционален ---- */
let wfView=true;
function setWfView(on){
  wfView=on;
  $('wfBtn').classList.toggle('on',on);
  roll.classList.toggle('nowf',!on);
  try{localStorage.setItem('vocalassist.wfview',on?'1':'0');}catch(e){}
  if(!on) clearFx();
}
$('wfBtn').onclick=()=>setWfView(!wfView);
function detectPitch(buf,sr){
  const N=buf.length;
  let rms=0, e0=0;
  for(let i=0;i<N;i++){rms+=buf[i]*buf[i];}
  e0=rms; rms=Math.sqrt(rms/N);
  if(rms<0.004) return 0;
  const minLag=Math.floor(sr/1000), maxLag=Math.min(N-1,Math.floor(sr/80));
  const c=new Float32Array(maxLag+1);
  let best=-1, bestV=0;
  for(let lag=minLag;lag<=maxLag;lag++){
    let s=0;
    for(let i=0;i<N-lag;i++) s+=buf[i]*buf[i+lag];
    c[lag]=s;
    if(s>bestV){bestV=s;best=lag;}
  }
  if(best<0||bestV/e0<0.3) return 0;
  for(let lag=minLag+1;lag<best;lag++){
    if(c[lag]>0.9*bestV&&c[lag]>=c[lag-1]&&c[lag]>=c[lag+1]){best=lag;break;}
  }
  const y1=c[best-1]||0, y2=c[best], y3=c[best+1]||0;
  const denom=2*(2*y2-y1-y3);
  const shift=denom?(y3-y1)/denom:0;
  return sr/(best+shift);
}
const midiOf=f=>69+12*Math.log2(f/440);
function xPct(mf){
  mf=Math.min(kHIGH,Math.max(kLOW,mf));
  const m1=Math.floor(mf), f=mf-m1;
  const x1=xForMidi(m1), x2=xForMidi(Math.min(kHIGH,m1+1));
  return x1+(x2-x1)*f;
}
function drawPitch(){
  const dd=window.devicePixelRatio||1;
  if(pc.width!==Math.round(roll.clientWidth*dd)||pc.height!==Math.round(roll.clientHeight*dd)) sizeCanvas();
  const ctx=pc.getContext('2d');
  ctx.clearRect(0,0,pc.width,pc.height);
  if(!micOn) return;
  const d=dd, W=pc.width, H=pc.height;
  const lineY=H-NOWLINE*d, pxq=lineY/LOOK;
  const q=playing?nowQ():null;
  if(q!=null){
    ctx.save(); ctx.beginPath(); ctx.rect(0,lineY,W,H-lineY); ctx.clip();
    ctx.fillStyle='#79cfffaa';
    for(const s of pitchSamples){
      if(s.q==null) continue;
      const dq=q-s.q; if(dq<0||dq>1.5) continue;
      ctx.beginPath();
      ctx.arc(xPct(s.mf)*W/100, lineY+dq*pxq, 2*d, 0, 7);
      ctx.fill();
    }
    ctx.restore();
  }
  const last=pitchSamples[pitchSamples.length-1];
  if(last&&performance.now()-last.t<200){
    const good=last.diff!=null&&Math.abs(last.diff)<=0.5;
    const x=xPct(last.mf)*W/100;
    const rgb=good?'142,240,176':'121,207,255';
    // вертикальный луч твоего тона — на всю высоту рулона, сквозь падающие ноты
    const grad=ctx.createLinearGradient(0,0,0,lineY);
    grad.addColorStop(0,'rgba('+rgb+',0.05)');
    grad.addColorStop(0.6,'rgba('+rgb+',0.28)');
    grad.addColorStop(1,'rgba('+rgb+',0.85)');
    ctx.fillStyle=grad;
    ctx.fillRect(x-1.5*d,0,3*d,lineY);
    // мягкое свечение луча у линии
    const glow=ctx.createLinearGradient(0,lineY*0.55,0,lineY);
    glow.addColorStop(0,'rgba('+rgb+',0)');
    glow.addColorStop(1,'rgba('+rgb+',0.16)');
    ctx.fillStyle=glow;
    ctx.fillRect(x-7*d,lineY*0.55,14*d,lineY*0.45);
    ctx.beginPath();
    ctx.arc(x, lineY, 5*d, 0, 7);
    ctx.fillStyle=good?'#8ef0b0':'#79cfff';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=12*d;
    ctx.fill(); ctx.shadowBlur=0;
  }
}
async function micToggle(){
  if(micOn){
    micOn=false; cancelAnimationFrame(micRaf);
    if(capNode){try{capNode.port.onmessage=null;capNode.disconnect();}catch(e){} capNode=null;}
    if(capMute){try{capMute.disconnect();}catch(e){} capMute=null;}
    analyser=null;
    if(micStream) micStream.getTracks().forEach(tr=>tr.stop());
    micStream=null;
    $('micBtn').classList.remove('on');
    $('sungBox').style.display='none'; $('hitBox').style.display='none';
    pc.getContext('2d').clearRect(0,0,pc.width,pc.height);
    return;
  }
  if(!navigator.mediaDevices?.getUserMedia){
    toast(window.isSecureContext?t('micUnsup'):t('micNoHttps'));
    return;
  }
  try{
    initAudio(); if(ac.state==='suspended') await ac.resume();
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{echoCancellation:true, noiseSuppression:false, autoGainControl:true}
    });
  }catch(err){
    toast(t('micUnavail')+': '+(err.name==='NotAllowedError'?t('micDenied'):err.message));
    return;
  }
  const src=ac.createMediaStreamSource(micStream);
  workletMode=false;
  try{
    if(ac.audioWorklet){
      if(!capModuleP)
        capModuleP=ac.audioWorklet.addModule(URL.createObjectURL(new Blob([CAP_CODE],{type:'text/javascript'})));
      await capModuleP;
      capNode=new AudioWorkletNode(ac,'vacap');
      capMute=ac.createGain(); capMute.gain.value=0;
      src.connect(capNode); capNode.connect(capMute); capMute.connect(ac.destination);
      capNode.port.onmessage=e=>{if(micOn) onMicChunk(e.data);};
      workletMode=true;
    }
  }catch(e){ capModuleP=null; capNode=null; }
  if(!workletMode){ // совместимый режим: опрос анализатора
    analyser=ac.createAnalyser(); analyser.fftSize=2048;
    src.connect(analyser);
    micBuf=new Float32Array(analyser.fftSize);
  }
  ringW=0; ringFilled=0; lastF=0; silentN=0; trk=null; pendMf=null; pendN=0;
  micOn=true; hitN=0; hitT=0;
  $('micBtn').classList.add('on');
  $('sungBox').style.display=''; $('hitBox').style.display='';
  toast(window.PitchDetector?t('micPitchy'):t('micBasic'));
  sizeCanvas(); micLoop();
}
/* захват через AudioWorklet (стабильные ~46 оценок/с), адаптивное окно, сглаживание с гистерезисом */
const CAP_CODE=`class Cap extends AudioWorkletProcessor{
constructor(){super();this.b=new Float32Array(1024);this.n=0;}
process(inp){const c=inp[0]&&inp[0][0];if(c){let i=0;while(i<c.length){const k=Math.min(1024-this.n,c.length-i);this.b.set(c.subarray(i,i+k),this.n);this.n+=k;i+=k;if(this.n===1024){this.port.postMessage(this.b.slice(0));this.n=0;}}}return true;}}
registerProcessor('vacap',Cap);`;
let capModuleP=null, capNode=null, capMute=null, workletMode=false;
const RING=8192;
let ring=new Float32Array(RING), ringW=0, ringFilled=0, lastF=0, silentN=0;
let trk=null, pendMf=null, pendN=0;
const pitchyDets={};
function pitchAny(buf){
  const sr=ac.sampleRate;
  if(window.PitchDetector){
    const det=pitchyDets[buf.length]||(pitchyDets[buf.length]=window.PitchDetector.forFloat32Array(buf.length));
    let rms=0;
    for(let i=0;i<buf.length;i++) rms+=buf[i]*buf[i];
    if(Math.sqrt(rms/buf.length)<0.004) return 0;
    const [p,c]=det.findPitch(buf,sr);
    return (c>=0.8&&p>=60&&p<=1200)?p:0;
  }
  return detectPitch(buf,sr);
}
// выброс на кадр-другой гасится, честный скачок (в т.ч. на октаву) подтверждается двумя кадрами
function smoothPitch(mf){
  if(trk==null){trk=mf; pendMf=null; pendN=0; return trk;}
  if(Math.abs(mf-trk)<=1.0){trk+=0.6*(mf-trk); pendMf=null; pendN=0; return trk;}
  if(pendMf!=null&&Math.abs(mf-pendMf)<=0.8){
    if(++pendN>=2){trk=mf; pendMf=null; pendN=0; return trk;}
  } else {pendMf=mf; pendN=1;}
  return trk;
}
function onMicChunk(ch){
  for(let i=0;i<ch.length;i++){ring[ringW]=ch[i]; ringW=(ringW+1)%RING;}
  ringFilled=Math.min(RING,ringFilled+ch.length);
  detectTick();
}
function lastWindow(n){
  if(ringFilled<n) return null;
  const out=new Float32Array(n), start=(ringW-n+RING)%RING;
  if(start+n<=RING) out.set(ring.subarray(start,start+n));
  else{const k=RING-start; out.set(ring.subarray(start)); out.set(ring.subarray(0,n-k),k);}
  return out;
}
function detectTick(){
  let n=(lastF>0&&lastF<160)?4096:2048; // низким нотам — длинное окно
  let buf=lastWindow(n);
  if(!buf&&n===4096) buf=lastWindow(n=2048);
  if(!buf) return;
  let f=pitchAny(buf);
  if(!f&&n===2048){const b=lastWindow(4096); if(b){const f4=pitchAny(b); if(f4) f=f4;}}
  if(f) lastF=f;
  processPitch(f);
}
function processPitch(f){
  if(!(f>0)){
    if(++silentN>18){trk=null; pendMf=null; pendN=0;}
    return;
  }
  silentN=0;
  const mf=smoothPitch(midiOf(f));
  let diff=null;
  if(playing&&curNoteG){
    diff=mf-curNoteG[2];
    hitT++; if(Math.abs(diff)<=0.5) hitN++;
    if(hitT%10===0) $('hitPct').textContent=Math.round(hitN/hitT*100)+'%';
  }
  pitchSamples.push({t:performance.now(), q:playing?nowQ():null, mf, diff});
  if(pitchSamples.length>500) pitchSamples.splice(0,100);
  const near=Math.round(mf), cents=Math.round((mf-near)*100);
  $('sungNN').textContent=noteFull(near);
  $('sungCents').textContent=(cents>0?'+':'')+cents+'¢';
  $('sungBox').classList.toggle('off', diff!=null&&Math.abs(diff)>0.5);
}
function micLoop(){
  if(!micOn) return;
  if(!workletMode&&analyser){ // совместимый режим без AudioWorklet
    analyser.getFloatTimeDomainData(micBuf);
    processPitch(pitchAny(micBuf));
  }
  drawPitch();
  if(hView&&!playing) drawHView(startQ);
  micRaf=requestAnimationFrame(micLoop);
}
$('micBtn').onclick=micToggle;

/* ---- hotkeys ---- */
window.addEventListener('keydown',e=>{
  if($('songModal').classList.contains('open')){
    if(e.code==='Escape') closeSongModal();
    return;
  }
  if(e.target.tagName==='INPUT'||e.target.classList?.contains('scard')) return;
  if(e.code==='Space'){e.preventDefault();if(e.target.tagName==='BUTTON')e.target.blur();playing?pause():play(true);}
  else if(e.code==='ArrowLeft'){e.preventDefault();phraseStep(-1);}
  else if(e.code==='ArrowRight'){e.preventDefault();phraseStep(1);}
  else if(e.code==='KeyL'){$('phLoop').click();}
  else if(e.code==='KeyR'){initAudio();reset();}
});

applySong(LIB.songs.find(s=>s.id===LIB.last)||BUILTIN);
sizeCanvas();
loadRepoList();
preloadSfScripts(); // сэмплы инструментов качаются в фоне, к первому нажатию «Петь» обычно уже готовы
if(localStorage.getItem('vocalassist.hview')==='1') setHView(true);
if(localStorage.getItem('vocalassist.wfview')==='0') setWfView(false);
$('langBtn').onclick=()=>{LANG=(LANG==='ru')?'en':'ru';try{localStorage.setItem('vocalassist.lang',LANG);}catch(e){}applyLang();};
$('noteBtn').onclick=()=>{noteStyle=(noteStyle==='letters')?'solfege':'letters';try{localStorage.setItem('vocalassist.notes',noteStyle);}catch(e){}applyLang();};
applyLang();
window.addEventListener('resize',()=>{sizeCanvas();if(!playing){render(startQ);drawPitch();if(hView)drawHView(startQ);}});
</script>
